name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC — keine gespeicherten Credentials
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  deploy-dev:
    name: Apply dev
    runs-on: ubuntu-latest
    environment: dev # GitHub Environment: dev deployt automatisch
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply (dev)
        working-directory: live/dev
        run: terragrunt run-all apply --tf-forward-stdout

  deploy-prod:
    name: Apply prod (approval required)
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod # Required Reviewer = manuelles Approval Gate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply (prod)
        working-directory: live/prod
        run: terragrunt run-all apply --tf-forward-stdout
