name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC — keine gespeicherten Credentials
  contents: read

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TG_NON_INTERACTIVE: "true"

jobs:
  deploy-governance:
    name: Apply governance (subscription scope)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply (governance)
        working-directory: live/global
        run: terragrunt run --all apply --tf-forward-stdout

  deploy-dev:
    name: Apply dev
    needs: deploy-governance
    runs-on: ubuntu-latest
    environment: dev # GitHub Environment: dev deployt automatisch
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply (dev)
        working-directory: live/dev
        run: terragrunt run --all apply --tf-forward-stdout

  deploy-app-dev:
    name: Deploy app (dev)
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # App-Insights-Connection-String zur Deploy-Zeit injizieren (kein Secret im Repo)
      - name: Inject App Insights connection string
        run: |
          CS=$(az resource show \
            --resource-group rg-poc-dev \
            --name appi-poc-dev \
            --resource-type "Microsoft.Insights/components" \
            --query properties.ConnectionString -o tsv)
          sed -i "s|__APPINSIGHTS_CONNECTION_STRING__|$CS|" app/index.html

      # Deploy-Token wird zur Laufzeit via OIDC geholt — nirgends gespeichert
      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name stapp-poc-dev \
            --resource-group rg-poc-dev \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy static site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          app_location: app
          skip_app_build: true
          skip_api_build: true

  deploy-prod:
    name: Apply prod (approval required)
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod # Required Reviewer = manuelles Approval Gate
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Apply (prod)
        working-directory: live/prod
        run: terragrunt run --all apply --tf-forward-stdout

  deploy-app-prod:
    name: Deploy app (prod)
    needs: deploy-prod
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Inject App Insights connection string
        run: |
          CS=$(az resource show \
            --resource-group rg-poc-prod \
            --name appi-poc-prod \
            --resource-type "Microsoft.Insights/components" \
            --query properties.ConnectionString -o tsv)
          sed -i "s|__APPINSIGHTS_CONNECTION_STRING__|$CS|" app/index.html

      - name: Fetch SWA deployment token
        id: swa-token
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name stapp-poc-prod \
            --resource-group rg-poc-prod \
            --query properties.apiKey -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy static site
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa-token.outputs.token }}
          action: upload
          app_location: app
          skip_app_build: true
          skip_api_build: true
