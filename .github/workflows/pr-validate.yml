name: PR Validate

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write # OIDC-Token für Azure Login — keine Secrets im Repo!
  contents: read
  pull-requests: write # Plan als PR-Kommentar
  security-events: write # Checkov-SARIF -> GitHub Security Tab

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"

jobs:
  # -------------------------------------------------------------------------
  # Statische Analyse: schnell, ohne Cloud-Zugriff
  # -------------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: terraform fmt
        run: terraform fmt -check -recursive -diff

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: TFLint (alle Module)
        run: |
          tflint --init
          for dir in modules/*/; do
            echo "::group::tflint $dir"
            tflint --chdir="$dir"
            echo "::endgroup::"
          done

  # -------------------------------------------------------------------------
  # DevSecOps: IaC-Security-Scan, Findings landen im GitHub Security Tab
  # -------------------------------------------------------------------------
  security:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules/
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

  # -------------------------------------------------------------------------
  # Plan pro Environment, Ergebnis als PR-Kommentar
  # -------------------------------------------------------------------------
  plan:
    name: Plan (${{ matrix.env }})
    needs: [lint, security]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Setup Terragrunt
        run: |
          curl -sSLo /usr/local/bin/terragrunt \
            https://github.com/gruntwork-io/terragrunt/releases/download/v1.1.1/terragrunt_linux_amd64
          chmod +x /usr/local/bin/terragrunt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Terragrunt Plan
        id: plan
        working-directory: live/${{ matrix.env }}
        run: |
          terragrunt run-all plan --tf-forward-stdout 2>&1 | tee plan.txt

      - name: Plan als PR-Kommentar
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('live/${{ matrix.env }}/plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.slice(-60000);
            const body = `### Terragrunt Plan — \`${{ matrix.env }}\`\n\n<details><summary>Plan-Output anzeigen</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
